<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks â€“ VIATOR</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .bm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo"><img src="assets/logo_editorial_transparent.png" alt="Viator Logo" style="height: 28px; width: auto; margin-right: 8px; vertical-align: middle;"> VIATOR<span></span></a>
            <div class="nav-links" id="nav-links"></div>
            <div class="nav-actions" id="nav-actions"></div>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <main class="page-content">
        <div class="container">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;">
                <div>
                    <h1 style="margin-bottom:0.25rem;">ðŸ”– Your Bookmarks</h1>
                    <p style="color:var(--text-secondary);">Experiences you've saved for later</p>
                </div>
                <a href="feed.html" class="btn btn-ghost">â† Back to Feed</a>
            </div>
            <div class="bm-grid" id="bm-grid"></div>
            <div class="empty-state" id="bm-empty" style="display:none;">
                <div class="empty-icon">ðŸ”–</div>
                <h3 class="empty-title">No bookmarks yet</h3>
                <p class="empty-desc">Bookmark experiences from the feed to save them here for future planning.</p>
                <a href="feed.html" class="btn btn-primary">Browse Feed</a>
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!requireAuth()) throw new Error('Auth required');

        function render() {
            const session = SessionDB.get();
            const user = UserDB.getById(session.id);
            const bookmarks = user?.bookmarks || [];
            const grid = document.getElementById('bm-grid');
            const empty = document.getElementById('bm-empty');

            const posts = bookmarks.map(id => PostDB.getById(id)).filter(p => p && p.status === 'approved');
            if (posts.length === 0) { grid.innerHTML = ''; empty.style.display = 'flex'; return; }
            empty.style.display = 'none';

            grid.innerHTML = posts.map(p => {
                const author = UserDB.getById(p.userId);
                const initials = author?.name?.[0]?.toUpperCase() || '?';
                const img = p.photos?.[0] ? `<img src="${p.photos[0]}" alt="${p.title}" loading="lazy">` : `<div class="exp-card-img-placeholder">ðŸŒ</div>`;
                return `
          <article class="exp-card">
            <a href="experience-detail.html?id=${p.id}" style="text-decoration:none;display:block;">
              <div class="exp-card-img">${img}<span class="exp-card-badge">${p.travelStyle}</span></div>
              <div class="exp-card-body">
                <div class="exp-card-dest">ðŸ“ ${p.destination}</div>
                <h3 class="exp-card-title">${p.title}</h3>
                <p class="exp-card-excerpt">${p.description}</p>
              </div>
            </a>
            <div class="card-footer" style="display:flex;align-items:center;justify-content:space-between;">
              <a href="profile.html?id=${p.userId}" style="display:flex;align-items:center;gap:0.5rem;text-decoration:none;">
                <div class="exp-card-avatar">${initials}</div>
                <span class="exp-card-author-name">${author?.name || 'Unknown'}</span>
              </a>
              <button class="btn btn-ghost btn-sm" onclick="removeBookmark('${p.id}')">ðŸ—‘ï¸ Remove</button>
            </div>
          </article>`;
            }).join('');
        }

        function removeBookmark(postId) {
            const session = SessionDB.get();
            UserDB.toggleBookmark(session.id, postId);
            showToast('Removed from bookmarks.', 'info');
            render();
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>

</html>
