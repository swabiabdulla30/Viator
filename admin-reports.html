<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports – VIATOR Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="admin-sidebar-logo">
                <a href="admin-dashboard.html"><svg class="nav-logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 8px;"><path d="M4 4L12 20L20 4H16.5L12 14L7.5 4H4Z" fill="currentColor"/><path d="M12 8L11 11H13L12 8Z" fill="white"/></svg> VIATOR <span>Admin</span></a>
            </div>
            <nav class="admin-nav">
                <div class="admin-nav-label">Overview</div>
                <a class="admin-nav-item" href="admin-dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
                <div class="admin-nav-label" style="margin-top:1rem;">Content</div>
                <a class="admin-nav-item" href="admin-posts.html"><span class="nav-icon">📝</span> Posts</a>
                <a class="admin-nav-item" href="admin-users.html"><span class="nav-icon">👥</span> Users</a>
                <a class="admin-nav-item active" href="admin-reports.html"><span class="nav-icon">🚨</span> Reports
                    <span class="admin-nav-badge" id="sb-reports">0</span></a>
                <div class="admin-nav-label" style="margin-top:1rem;">Account</div>
                <a class="admin-nav-item" href="index.html" target="_blank"><span class="nav-icon">🌐</span> View Site</a>
                <button class="admin-nav-item" style="width:100%;text-align:left;" onclick="logout()"><span class="nav-icon">🚪</span> Log Out</button>
            </nav>
        </aside>

        <main class="admin-main">
            <div class="admin-topbar">
                <div>
                    <div class="admin-page-title">🚨 User Reports</div>
                    <p style="color:var(--text-muted);font-size:0.85rem;margin:0;" id="report-count-label"></p>
                </div>
                <div style="display:flex;gap:0.75rem;">
                    <button class="btn btn-ghost btn-sm" onclick="exportReports()">📥 Export JSON</button>
                </div>
            </div>

            <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;">
                <button class="tab-btn active" data-rs="all" onclick="setRStatus(this)">All</button>
                <button class="tab-btn" data-rs="pending" onclick="setRStatus(this)">⏳ Pending</button>
                <button class="tab-btn" data-rs="resolved" onclick="setRStatus(this)">✅ Resolved</button>
            </div>

            <!-- Summary Stats -->
            <div class="grid-3" style="margin-bottom:2rem;" id="report-stats"></div>

            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Reported Post</th>
                            <th>Reporter</th>
                            <th>Reason</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reports-tbody"></tbody>
                </table>
            </div>
            <div id="reports-empty" class="empty-state" style="display:none;">
                <div class="empty-icon">✅</div>
                <h3 class="empty-title">No reports found</h3>
                <p class="empty-desc">All clear — no user reports to review.</p>
            </div>
        </main>
    </div>

    <button class="admin-hamburger" id="admin-hamburger">
        <span></span><span></span><span></span>
    </button>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Admin Sidebar Toggle
        const adminBurger = document.getElementById('admin-hamburger');
        const adminSidebar = document.querySelector('.admin-sidebar');
        if (adminBurger && adminSidebar) {
            adminBurger.addEventListener('click', () => {
                adminSidebar.classList.toggle('open');
            });
        }

        if (!requireAdmin()) throw new Error();
        let rStatus = 'all';

        function setRStatus(btn) {
            document.querySelectorAll('[data-rs]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            rStatus = btn.dataset.rs;
            renderReports();
        }

        function renderReports() {
            let reports = ReportDB.getAll();
            const pendingCount = reports.filter(r => r.status === 'pending').length;
            const resolvedCount = reports.filter(r => r.status === 'resolved').length;
            document.getElementById('sb-reports').textContent = pendingCount;

            document.getElementById('report-stats').innerHTML = `
      <div class="stat-card">
        <div class="stat-icon">📋</div>
        <div class="stat-value">${reports.length}</div>
        <div class="stat-label">Total Reports</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-value">${pendingCount}</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-value">${resolvedCount}</div>
        <div class="stat-label">Resolved</div>
      </div>`;

            if (rStatus !== 'all') reports = reports.filter(r => r.status === rStatus);
            reports.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            document.getElementById('report-count-label').textContent = `${reports.length} report${reports.length !== 1 ? 's' : ''}`;

            const tbody = document.getElementById('reports-tbody');
            const empty = document.getElementById('reports-empty');
            if (reports.length === 0) { tbody.innerHTML = ''; empty.style.display = 'flex'; return; }
            empty.style.display = 'none';

            tbody.innerHTML = reports.map(r => {
                const post = PostDB.getById(r.postId);
                const reporter = UserDB.getById(r.userId);
                const bc = r.status === 'pending' ? 'badge-warning' : 'badge-success';
                return `<tr>
        <td>
          ${post
                        ? `<a href="experience-detail.html?id=${post.id}" target="_blank" style="color:var(--text-primary);font-weight:600;font-size:0.84rem;">${post.title.substring(0, 45)}${post.title.length > 45 ? '…' : ''}</a>`
                        : `<span style="color:var(--text-muted);font-size:0.84rem;">[Post deleted]</span>`}
        </td>
        <td style="font-size:0.84rem;color:var(--text-secondary);">${reporter?.name || 'Unknown'}</td>
        <td>
          <span class="badge badge-danger">${r.reason}</span>
          ${r.details ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem;">${r.details.substring(0, 60)}${r.details.length > 60 ? '…' : ''}</div>` : ''}
        </td>
        <td style="font-size:0.8rem;color:var(--text-muted);">${timeAgo(r.createdAt)}</td>
        <td><span class="badge ${bc}">${r.status}</span></td>
        <td>
          <div class="table-actions">
            ${r.status === 'pending' ? `<button class="btn btn-primary btn-sm" onclick="resolveReport('${r.id}')">✅ Resolve</button>` : ''}
            ${post ? `<button class="btn btn-danger btn-sm" onclick="deleteReportedPost('${r.postId}','${r.id}')">🗑️ Remove Post</button>` : ''}
            <button class="btn btn-ghost btn-sm" onclick="deleteReport('${r.id}')">✕</button>
          </div>
        </td>
      </tr>`;
            }).join('');
        }

        function resolveReport(id) {
            ReportDB.resolve(id);
            showToast('Report marked as resolved. ✅', 'success');
            renderReports();
        }

        function deleteReport(id) {
            confirmAction('Remove this report?', () => {
                ReportDB.delete(id); showToast('Report removed.', 'info'); renderReports();
            });
        }

        function deleteReportedPost(postId, reportId) {
            confirmAction('Delete the reported post? This cannot be undone.', () => {
                PostDB.delete(postId);
                ReportDB.resolve(reportId);
                showToast('Post deleted and report resolved.', 'success');
                renderReports();
            });
        }

        function exportReports() {
            const reports = ReportDB.getAll().map(r => ({
                ...r,
                post: PostDB.getById(r.postId)?.title || '[deleted]',
                reporter: UserDB.getById(r.userId)?.name || 'Unknown',
            }));
            const blob = new Blob([JSON.stringify(reports, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `viator-reports-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Reports exported! 📥', 'success');
        }

        document.addEventListener('DOMContentLoaded', renderReports);
    </script>
</body>

</html>
