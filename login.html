<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In â€“ VIATOR Journal</title>
    <meta name="description" content="Log in to your VIATOR journal account to chronicle your extraordinary journeys.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-split">
        <!-- Visual Panel -->
        <div class="auth-visual">
            <img src="assets/p1.png" alt="Travel Landscape">
            <div class="auth-visual-overlay">
                <div>
                    <h2 class="auth-quote">"The world is a book and those who do not travel read only one page."</h2>
                    <div class="auth-quote-author">ST. AUGUSTINE</div>
                </div>
            </div>
        </div>

        <div class="auth-panel">
            <div class="auth-logo-header">
                <a href="index.html" class="nav-logo" style="text-decoration: none; color: var(--accent); display: flex; align-items: center; gap: 0.5rem; font-family: var(--font-head); font-size: 1.5rem;">
                    <img src="assets/logo_editorial_transparent.png" alt="Viator Logo" style="height: 28px; width: auto; margin-right: 8px; vertical-align: middle;">
                    VIATOR
                </a>
                <a href="javascript:history.back()" class="auth-back">&times;</a>
            </div>
            
            <div class="auth-form-wrap">
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Log in to keep exploring and chronicling your journeys.</p>

                <div id="form-alert"></div>

                <form id="login-form" class="auth-form" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="login-email">Email Address</label>
                        <input class="form-input" id="login-email" type="email" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="login-password">Password</label>
                        <div style="position: relative;">
                            <input class="form-input" id="login-password" type="password" placeholder="Your password" autocomplete="current-password" required>
                            <button type="button" id="toggle-pw" style="position: absolute; right: 0; bottom: 10px; background: none; border: none; font-size: 1rem; cursor: pointer; color: var(--text-muted);">&bull;&bull;&bull;</button>
                        </div>
                    </div>

                    <button type="submit" class="btn-premium" id="login-btn">
                        <span>Sign In</span>
                        <span class="arrow">&rarr;</span>
                    </button>
                </form>

                <p class="auth-link">Not yet part of the journal? <a href="register.html">Apply to join</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            redirectIfLoggedIn('feed.html');
            redirectIfAdminLoggedIn('admin-dashboard.html');

            document.getElementById('toggle-pw').addEventListener('click', function () {
                const pw = document.getElementById('login-password');
                const isText = pw.type === 'text';
                pw.type = isText ? 'password' : 'text';
                this.innerHTML = isText ? '&bull;&bull;&bull;' : 'O';
            });

            document.getElementById('login-form').addEventListener('submit', function (e) {
                e.preventDefault();
                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;

                if (!email || !password) {
                    document.getElementById('form-alert').innerHTML = `<p style="color: var(--danger); font-size: 0.8rem; margin-bottom: 1rem;">Please provide both email and password.</p>`;
                    return;
                }

                const btn = document.getElementById('login-btn');
                btn.disabled = true;
                btn.querySelector('span:first-child').textContent = 'Authenticating...';

                setTimeout(() => {
                    const result = login({ email, password });
                    if (result.success) {
                        const next = new URLSearchParams(window.location.search).get('next');
                        if (result.user.role === 'admin') window.location.href = 'admin-dashboard.html';
                        else if (next) window.location.href = decodeURIComponent(next);
                        else window.location.href = 'feed.html';
                    } else {
                        document.getElementById('form-alert').innerHTML = `<p style="color: var(--danger); font-size: 0.8rem; margin-bottom: 1rem;">${result.error}</p>`;
                        btn.disabled = false;
                        btn.querySelector('span:first-child').textContent = 'Sign In';
                    }
                }, 600);
            });
        });
    </script>
</body>
</html>
