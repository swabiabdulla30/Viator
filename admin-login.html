<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – VIATOR</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-split">
        <div class="auth-visual">
            <img src="https://images.unsplash.com/photo-1493246507139-91e8bef99c17?auto=format&fit=crop&q=80" alt="Admin View">
            <div class="auth-visual-overlay">
                <div class="auth-quote">
                    "Control the narrative, <br>craft the journey."
                    <div class="auth-quote-author">Viator Editorial Suite</div>
                </div>
            </div>
        </div>

        <div class="auth-panel">
            <a href="index.html" class="auth-logo-top">VIATOR</a>
            <a href="login.html" class="auth-back">×</a>

            <div class="auth-form-wrap">
                <h1 class="auth-title">Admin Portal</h1>
                <p class="auth-subtitle">VIATOR Content Management</p>

                <div id="form-alert"></div>
                <form id="admin-login-form" class="auth-form" novalidate>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input class="form-input" id="admin-email" type="email" value="admin@viator.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input class="form-input" id="admin-password" type="password" value="Admin@123" required>
                        <button type="button" class="toggle-pw" id="toggle-pw">👁️</button>
                    </div>

                    <button type="submit" class="btn-premium" id="admin-login-btn">
                        🛡️ Sign In <span>→</span>
                    </button>
                </form>

                <div class="auth-link">
                    <a href="login.html">← Back to user login</a>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (SessionDB.isLoggedIn() && SessionDB.isAdmin()) window.location.href = 'admin-dashboard.html';

        document.getElementById('toggle-pw').addEventListener('click', function () {
            const pw = document.getElementById('admin-password');
            const isText = pw.type === 'text';
            pw.type = isText ? 'password' : 'text';
            this.textContent = isText ? '👁️' : '🙈';
        });

        document.getElementById('admin-login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value;
            const btn = document.getElementById('admin-login-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Signing in...';

            setTimeout(() => {
                const result = login({ email, password });
                if (result.success && result.user.role === 'admin') {
                    showToast('Welcome, Admin! 🛡️', 'success');
                    setTimeout(() => window.location.href = 'admin-dashboard.html', 800);
                } else {
                    document.getElementById('form-alert').innerHTML = `<div class="alert alert-error">⚠️ ${result.success ? 'Access denied. Not an admin account.' : result.error}</div>`;
                    btn.disabled = false;
                    btn.innerHTML = '🛡️ Sign In as Admin';
                }
            }, 600);
        });
    </script>
</body>

</html>
