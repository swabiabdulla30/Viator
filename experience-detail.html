<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience – VIATOR</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo"><svg class="nav-logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 4L12 20L20 4H16.5L12 14L7.5 4H4Z" fill="currentColor"/><path d="M12 8L11 11H13L12 8Z" fill="white"/></svg> VIATOR<span></span></a>
            <div class="nav-links" id="nav-links"></div>
            <div class="nav-actions" id="nav-actions"></div>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <main class="page-content">
        <div class="container" style="max-width:900px; width: 100%;">
            <div id="post-content"></div>
            <div id="not-found" style="display:none;" class="empty-state">
                <div class="empty-icon">🗺️</div>
                <h3 class="empty-title">Experience not found</h3>
                <p class="empty-desc">This post may have been removed or doesn't exist.</p>
                <a href="feed.html" class="btn btn-primary">Browse Feed</a>
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <!-- Report Modal -->
    <div class="modal-overlay" id="report-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">🚨 Report Content</h3>
                <button class="modal-close" onclick="closeModal('report-modal')">✕</button>
            </div>
            <div class="form-group" style="margin-bottom:1.25rem;">
                <label class="form-label">Reason</label>
                <select class="form-input form-select" id="report-reason">
                    <option value="">Select a reason...</option>
                    <option>Inappropriate content</option>
                    <option>Misleading information</option>
                    <option>Spam</option>
                    <option>Harassment</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:1.5rem;">
                <label class="form-label">Additional Details (optional)</label>
                <textarea class="form-input form-textarea" id="report-details" placeholder="Tell us more..."></textarea>
            </div>
            <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
                <button class="btn btn-ghost" onclick="closeModal('report-modal')">Cancel</button>
                <button class="btn btn-danger" onclick="submitReport()">Submit Report</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const postId = new URLSearchParams(window.location.search).get('id');
        let currentPost = null;
        let replyingTo = null;

        function closeModal(id) { document.getElementById(id).classList.remove('open'); }
        function openModal(id) { document.getElementById(id).classList.add('open'); }

        function render() {
            const post = PostDB.getById(postId);
            if (!post || post.status !== 'approved') {
                document.getElementById('not-found').style.display = 'flex';
                return;
            }
            currentPost = post;
            const author = UserDB.getById(post.userId);
            const session = SessionDB.get();
            const isOwner = session?.id === post.userId;
            const isAdmin = session?.role === 'admin';
            const isLiked = session && post.likes.includes(session.id);
            const isBookmarked = session && (UserDB.getById(session.id)?.bookmarks || []).includes(post.id);
            document.title = `${post.title} – VIATOR`;

            // Photo carousel or placeholder
            let photosHTML = '';
            if (post.photos && post.photos.length > 0) {
                photosHTML = `
          <div class="photo-carousel" style="margin-bottom:2rem;border-radius:var(--radius-xl);overflow:hidden;max-height:clamp(300px, 60vw, 500px);">
            <div class="photo-carousel-track" id="carousel-track">
              ${post.photos.map(src => `
                <div class="photo-carousel-slide"><img src="${src}" alt="${post.title}"></div>`).join('')}
            </div>
            ${post.photos.length > 1 ? `
              <button class="carousel-btn prev" onclick="carousel(-1)">‹</button>
              <button class="carousel-btn next" onclick="carousel(1)">›</button>
              <div class="carousel-dots" id="carousel-dots">
                ${post.photos.map((_, i) => `<div class="carousel-dot ${i === 0 ? 'active' : ''}" onclick="goSlide(${i})"></div>`).join('')}
              </div>` : ''}
          </div>`;
            } else {
                photosHTML = `<div style="height:260px;border-radius:var(--radius-xl);background:linear-gradient(135deg,#0d2440,#071220);display:flex;align-items:center;justify-content:center;font-size:5rem;margin-bottom:2rem;">🌍</div>`;
            }

            const tagsHTML = (post.tags || []).map(t => `<span class="badge badge-muted">${t}</span>`).join('');

            document.getElementById('post-content').innerHTML = `
        <!-- Back link -->
        <a href="feed.html" style="display:inline-flex;align-items:center;gap:0.4rem;color:var(--text-muted);font-size:0.875rem;margin-bottom:1.5rem;">
          ← Back to Feed
        </a>

        ${photosHTML}

        <!-- Header -->
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.25rem;">
          <div>
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;flex-wrap:wrap;">
              <span class="badge badge-primary">${post.travelStyle}</span>
              <span class="badge badge-muted">${post.budget}</span>
              ${tagsHTML}
            </div>
            <h1 style="font-size:clamp(1.5rem,3vw,2.25rem);margin-bottom:0.75rem;">${post.title}</h1>
            <div style="display:flex;align-items:center;gap:0.5rem;color:var(--primary);font-weight:600;font-size:0.9rem;">
              📍 ${post.destination}
            </div>
          </div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
            ${isOwner ? `<a href="create-post.html?edit=${post.id}" class="btn btn-ghost btn-sm">✏️ Edit</a>` : ''}
            ${isOwner || isAdmin ? `<button class="btn btn-danger btn-sm" onclick="deletePost()">🗑️ Delete</button>` : ''}
          </div>
        </div>

        <!-- Author -->
        <a href="profile.html?id=${post.userId}" style="display:inline-flex;align-items:center;gap:0.75rem;padding:0.875rem 1.25rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:2rem;text-decoration:none;">
          <div class="nav-avatar" style="width:44px;height:44px;font-size:1.1rem;">${author?.name?.[0]?.toUpperCase() || '?'}</div>
          <div>
            <div style="font-weight:700;color:var(--text-primary);">${author?.name || 'Unknown'}</div>
            <div style="font-size:0.78rem;color:var(--text-muted);">Published ${timeAgo(post.createdAt)}</div>
          </div>
        </a>

        <!-- Description -->
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="card-body">
            <h3 style="margin-bottom:1rem;font-size:1.1rem;">📖 The Story</h3>
            <div style="color:var(--text-secondary);line-height:1.8;white-space:pre-line;">${post.description}</div>
          </div>
        </div>

        <!-- Tips & Lessons -->
        ${post.tips ? `
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="card-body">
            <h3 style="margin-bottom:1rem;font-size:1.1rem;color:var(--primary);">💡 Traveler Tips</h3>
            <p style="color:var(--text-secondary);line-height:1.7;white-space:pre-line;">${post.tips}</p>
          </div>
        </div>` : ''}

        ${post.lessons ? `
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="card-body">
            <h3 style="margin-bottom:1rem;font-size:1.1rem;color:var(--accent);">🎓 Lessons Learned</h3>
            <p style="color:var(--text-secondary);line-height:1.7;white-space:pre-line;">${post.lessons}</p>
          </div>
        </div>` : ''}

        <!-- Actions bar -->
        <div class="flex-stack-mobile" style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:2.5rem;padding:1.5rem;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);">
          <button class="btn btn-ghost" id="like-btn" onclick="toggleLike()" style="flex: 1;">
            ${isLiked ? '❤️' : '🤍'} <span id="like-count">${post.likes.length}</span> ${isLiked ? 'Liked' : 'Like'}
          </button>
          <button class="btn btn-ghost" id="bookmark-btn" onclick="toggleBookmark()" style="flex: 1;">
            ${isBookmarked ? '🔖' : '📑'} ${isBookmarked ? 'Bookmarked' : 'Bookmark'}
          </button>
          <button class="btn btn-ghost" onclick="sharePost()" style="flex: 1;">🔗 Share</button>
          ${session && !isOwner ? `<button class="btn btn-ghost" style="margin-left:auto;color:var(--danger); flex: 1;" onclick="openModal('report-modal')">🚨 Report</button>` : ''}
        </div>

        <!-- Comments -->
        <div class="card">
          <div class="card-header">
            <h3 style="font-size:1.1rem;margin:0;">💬 Comments (<span id="comment-count">${CommentDB.getByPost(postId).length}</span>)</h3>
          </div>
          <div class="card-body">
            ${session ? `
            <div style="display:flex;gap:0.75rem;margin-bottom:1.5rem;" id="comment-form-wrap">
              <div class="nav-avatar" style="width:36px;height:36px;font-size:0.85rem;flex-shrink:0;">${session.name?.[0]?.toUpperCase()}</div>
              <div style="flex:1;">
                <textarea class="form-input form-textarea" id="new-comment" placeholder="Share your thoughts..." style="min-height:80px;"></textarea>
                <button class="btn btn-primary btn-sm" style="margin-top:0.5rem;" onclick="postComment()">Post Comment</button>
              </div>
            </div>` : `<p style="color:var(--text-muted);margin-bottom:1.5rem;"><a href="login.html">Log in</a> to join the conversation.</p>`}
            <div id="comments-list" style="overflow-x: hidden;"></div>
          </div>
        </div>`;

            renderComments();
        }

        let slideIdx = 0;
        function carousel(dir) {
            const post = currentPost;
            if (!post?.photos?.length) return;
            slideIdx = (slideIdx + dir + post.photos.length) % post.photos.length;
            goSlide(slideIdx);
        }
        function goSlide(idx) {
            slideIdx = idx;
            const track = document.getElementById('carousel-track');
            if (track) track.style.transform = `translateX(-${idx * 100}%)`;
            document.querySelectorAll('.carousel-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
        }

        function renderComments() {
            const session = SessionDB.get();
            const threaded = CommentDB.getForPost(postId);
            const list = document.getElementById('comments-list');
            const count = document.getElementById('comment-count');
            const allComments = CommentDB.getByPost(postId);
            if (count) count.textContent = allComments.length;

            if (threaded.length === 0) {
                list.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:1rem;">No comments yet. Be the first!</p>';
                return;
            }

            function renderComment(c, isReply = false) {
                const user = UserDB.getById(c.userId);
                const canDelete = session && (session.id === c.userId || session.role === 'admin');
                return `
          <div class="comment">
            <div class="comment-avatar">${user?.name?.[0]?.toUpperCase() || '?'}</div>
            <div class="comment-body">
              <div class="comment-header">
                <a href="profile.html?id=${c.userId}" class="comment-author" style="color:var(--text-primary);text-decoration:none;">${user?.name || 'Unknown'}</a>
                <span class="comment-time">${timeAgo(c.createdAt)}</span>
              </div>
              <div class="comment-text">${c.text}</div>
              <div class="comment-actions">
                ${session && !isReply ? `<button class="comment-action-btn" onclick="startReply('${c.id}','${user?.name}')">💬 Reply</button>` : ''}
                ${canDelete ? `<button class="comment-action-btn" style="color:var(--danger);" onclick="deleteComment('${c.id}')">🗑️ Delete</button>` : ''}
              </div>
              ${!isReply && c.replies?.length ? `
                <div class="comment-replies">${c.replies.map(r => renderComment(r, true)).join('')}</div>` : ''}
              <div id="reply-form-${c.id}"></div>
            </div>
          </div>`;
            }

            list.innerHTML = threaded.map(c => renderComment(c)).join('');
        }

        function startReply(parentId, authorName) {
            // Remove existing reply forms
            document.querySelectorAll('[id^="reply-form-"]').forEach(el => el.innerHTML = '');
            const wrap = document.getElementById(`reply-form-${parentId}`);
            if (!wrap) return;
            wrap.innerHTML = `
        <div style="margin-top:0.75rem;display:flex;gap:0.5rem;">
          <textarea class="form-input form-textarea" id="reply-text-${parentId}" placeholder="Reply to ${authorName}..." style="min-height:65px;font-size:0.85rem;"></textarea>
        </div>
        <div style="display:flex;gap:0.5rem;margin-top:0.4rem;">
          <button class="btn btn-primary btn-sm" onclick="postComment('${parentId}')">Reply</button>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('reply-form-${parentId}').innerHTML=''">Cancel</button>
        </div>`;
        }

        function postComment(parentId = null) {
            const session = SessionDB.get();
            if (!session) { window.location.href = 'login.html'; return; }
            const inputId = parentId ? `reply-text-${parentId}` : 'new-comment';
            const text = document.getElementById(inputId)?.value?.trim();
            if (!text) { showToast('Comment cannot be empty.', 'warning'); return; }
            CommentDB.create({ postId, userId: session.id, parentId, text });
            if (!parentId) document.getElementById('new-comment').value = '';
            renderComments();
            showToast('Comment posted! 💬', 'success');
        }

        function deleteComment(id) {
            confirmAction('Delete this comment?', () => {
                CommentDB.delete(id);
                renderComments();
                showToast('Comment deleted.', 'info');
            });
        }

        function toggleLike() {
            const session = SessionDB.get();
            if (!session) { window.location.href = 'login.html'; return; }
            const liked = PostDB.toggleLike(postId, session.id);
            const post = PostDB.getById(postId);
            const btn = document.getElementById('like-btn');
            const count = document.getElementById('like-count');
            btn.innerHTML = `${liked ? '❤️' : '🤍'} <span id="like-count">${post.likes.length}</span> ${liked ? 'Liked' : 'Like'}`;
            showToast(liked ? 'Added to liked posts ❤️' : 'Removed from liked posts', liked ? 'success' : 'info');
        }

        function toggleBookmark() {
            const session = SessionDB.get();
            if (!session) { window.location.href = 'login.html'; return; }
            const bookmarked = UserDB.toggleBookmark(session.id, postId);
            SessionDB.set(UserDB.getById(session.id));
            document.getElementById('bookmark-btn').innerHTML = bookmarked ? '🔖 Bookmarked' : '📑 Bookmark';
            showToast(bookmarked ? 'Bookmarked! 🔖' : 'Removed from bookmarks', bookmarked ? 'success' : 'info');
        }

        function sharePost() {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(window.location.href);
                showToast('Link copied to clipboard! 🔗', 'success');
            }
        }

        function deletePost() {
            confirmAction('Are you sure you want to delete this post? This action cannot be undone.', () => {
                PostDB.delete(postId);
                showToast('Post deleted.', 'info');
                setTimeout(() => window.location.href = 'feed.html', 1000);
            });
        }

        function submitReport() {
            const session = SessionDB.get();
            if (!session) return;
            const reason = document.getElementById('report-reason').value;
            const details = document.getElementById('report-details').value;
            if (!reason) { showToast('Please select a reason.', 'warning'); return; }
            ReportDB.create({ postId, userId: session.id, reason, details });
            closeModal('report-modal');
            showToast('Report submitted. Thank you! 🚨', 'success');
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>

</html>
