<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard â€“ VIATOR Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="admin-sidebar-logo">
                <a href="admin-dashboard.html"><img src="assets/logo_editorial_transparent.png" alt="Viator Logo"> VIATOR <span>Admin</span></a>
            </div>
            <nav class="admin-nav">
                <div class="admin-nav-label">Overview</div>
                <a class="admin-nav-item active" href="admin-dashboard.html"><span class="nav-icon">📊</span>
                    Dashboard</a>
                <div class="admin-nav-label" style="margin-top:1rem;">Content</div>
                <a class="admin-nav-item" href="admin-posts.html"><span class="nav-icon">📝</span> Posts <span
                        class="admin-nav-badge" id="sb-pending">0</span></a>
                <a class="admin-nav-item" href="admin-users.html"><span class="nav-icon">👥</span> Users</a>
                <a class="admin-nav-item" href="admin-reports.html"><span class="nav-icon">🚨</span> Reports <span
                        class="admin-nav-badge" id="sb-reports">0</span></a>
                <div class="admin-nav-label" style="margin-top:1rem;">Account</div>
                <a class="admin-nav-item" href="index.html" target="_blank"><span class="nav-icon">🌐</span> View
                    Site</a>
                <button class="admin-nav-item" style="width:100%;text-align:left;" onclick="logout()"><span
                        class="nav-icon">🚪</span> Log Out</button>
            </nav>
        </aside>

        <!-- Main -->
        <main class="admin-main">
            <div class="admin-topbar">
                <div>
                    <div class="admin-page-title">ðŸ“Š Dashboard</div>
                    <p style="color:var(--text-muted);font-size:0.85rem;margin:0;" id="admin-greeting"></p>
                </div>
                <div style="display:flex;gap:0.75rem;align-items:center;">
                    <a href="admin-posts.html" class="btn btn-primary btn-sm">Review Posts â†’</a>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid-4" style="margin-bottom:2rem;" id="stats-grid"></div>

            <!-- Recent Activity Grid -->
            <div class="grid-2" style="gap:1.5rem;">
                <!-- Recent Posts -->
                <div>
                    <h3 style="margin-bottom:1rem;font-size:1.05rem;">ðŸ“ Recent Posts</h3>
                    <div class="table-wrap">
                        <table class="data-table" id="recent-posts-table">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Author</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="recent-posts-body"></tbody>
                        </table>
                    </div>
                </div>
                <!-- Pending Queue -->
                <div>
                    <h3 style="margin-bottom:1rem;font-size:1.05rem;">â³ Pending Review</h3>
                    <div id="pending-list"></div>
                    <div id="pending-empty" style="display:none;" class="empty-state" style="padding:2rem;">
                        <div class="empty-icon">âœ…</div>
                        <h4 class="empty-title">All caught up!</h4>
                        <p class="empty-desc">No posts pending review.</p>
                    </div>
                </div>
            </div>

            <!-- Style Distribution -->
            <div style="margin-top:2rem;">
                <h3 style="margin-bottom:1rem;font-size:1.05rem;">ðŸ“Š Posts by Travel Style</h3>
                <div class="card card-body" id="style-chart"></div>
            </div>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!requireAdmin()) throw new Error('Admin required');

        function render() {
            const session = SessionDB.get();
            document.getElementById('admin-greeting').textContent = `Welcome back, ${session?.name}`;

            const stats = getAdminStats();
            document.getElementById('sb-pending').textContent = stats.pendingPosts;
            document.getElementById('sb-reports').textContent = stats.pendingReports;

            document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card teal">
        <div class="stat-icon">ðŸ‘¥</div>
        <div class="stat-value">${stats.totalUsers}</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-icon">ðŸ“</div>
        <div class="stat-value">${stats.totalPosts}</div>
        <div class="stat-label">Published Posts</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-icon">â³</div>
        <div class="stat-value">${stats.pendingPosts}</div>
        <div class="stat-label">Pending Review</div>
      </div>
      <div class="stat-card danger">
        <div class="stat-icon">ðŸš¨</div>
        <div class="stat-value">${stats.pendingReports}</div>
        <div class="stat-label">Open Reports</div>
      </div>`;

            // Recent posts
            const posts = PostDB.getAll().slice(-8).reverse();
            document.getElementById('recent-posts-body').innerHTML = posts.map(p => {
                const author = UserDB.getById(p.userId);
                const badgeCls = p.status === 'approved' ? 'badge-success' : p.status === 'pending' ? 'badge-warning' : 'badge-danger';
                return `<tr>
        <td><a href="experience-detail.html?id=${p.id}" target="_blank" style="color:var(--text-primary);font-weight:500;font-size:0.82rem;">${p.title.substring(0, 40)}${p.title.length > 40 ? 'â€¦' : ''}</a></td>
        <td style="font-size:0.82rem;">${author?.name || '-'}</td>
        <td><span class="badge ${badgeCls}">${p.status}</span></td>
      </tr>`;
            }).join('') || '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);">No posts yet</td></tr>';

            // Pending list
            const pending = PostDB.getPending().slice(0, 5);
            if (pending.length === 0) { document.getElementById('pending-list').style.display = 'none'; document.getElementById('pending-empty').style.display = 'block'; }
            else {
                document.getElementById('pending-empty').style.display = 'none';
                document.getElementById('pending-list').innerHTML = pending.map(p => {
                    const author = UserDB.getById(p.userId);
                    return `<div style="padding:0.875rem 1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:0.75rem;">
          <div style="font-weight:600;font-size:0.875rem;margin-bottom:0.25rem;">${p.title.substring(0, 50)}${p.title.length > 50 ? 'â€¦' : ''}</div>
          <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.75rem;">By ${author?.name || 'Unknown'} Â· ${timeAgo(p.createdAt)}</div>
          <div style="display:flex;gap:0.5rem;">
            <button class="btn btn-primary btn-sm" onclick="approvePost('${p.id}')">âœ… Approve</button>
            <button class="btn btn-danger btn-sm" onclick="rejectPost('${p.id}')">âŒ Reject</button>
            <a href="experience-detail.html?id=${p.id}" target="_blank" class="btn btn-ghost btn-sm">ðŸ‘ï¸ View</a>
          </div>
        </div>`;
                }).join('');
            }

            // Style chart
            const approved = PostDB.getApproved();
            const styles = ['Adventure', 'Cultural', 'Budget', 'Luxury', 'Solo', 'Family', 'Romance', 'Road Trip'];
            const counts = styles.map(s => ({ label: s, count: approved.filter(p => p.travelStyle === s).length })).filter(x => x.count > 0);
            const maxCount = Math.max(...counts.map(c => c.count), 1);
            document.getElementById('style-chart').innerHTML = counts.length === 0
                ? '<p style="color:var(--text-muted);text-align:center;">No data yet</p>'
                : counts.map(c => `
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:0.75rem;">
          <div style="width:90px;font-size:0.8rem;color:var(--text-secondary);">${c.label}</div>
          <div style="flex:1;background:rgba(255,255,255,0.04);border-radius:var(--radius-full);height:10px;overflow:hidden;">
            <div style="width:${(c.count / maxCount) * 100}%;background:linear-gradient(90deg,var(--primary),#00a5c4);height:100%;border-radius:var(--radius-full);transition:width 0.6s ease;"></div>
          </div>
          <div style="width:30px;font-size:0.8rem;font-weight:600;color:var(--text-primary);">${c.count}</div>
        </div>`).join('');
        }

        function approvePost(id) { PostDB.setStatus(id, 'approved'); showToast('Post approved! âœ…', 'success'); render(); }
        function rejectPost(id) { PostDB.setStatus(id, 'rejected'); showToast('Post rejected.', 'info'); render(); }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>

</html>
