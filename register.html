<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Journal – VIATOR</title>
    <meta name="description" content="Apply to join the VIATOR journal and begin chronicling your extraordinary journeys.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-split">
        <!-- Visual Panel -->
        <div class="auth-visual">
            <img src="assets/p4.png" alt="Travel Landscape">
            <div class="auth-visual-overlay">
                <div>
                    <h2 class="auth-quote">"Travel makes one modest. You see what a tiny place you occupy in the world."</h2>
                    <div class="auth-quote-author">Gustave Flaubert</div>
                </div>
            </div>
        </div>

        <div class="auth-panel">
            <div class="auth-logo-header">
                <a href="index.html" class="nav-logo" style="text-decoration: none; color: var(--accent); display: flex; align-items: center; gap: 0.5rem; font-family: var(--font-head); font-size: 1.5rem;">
                    <svg class="nav-logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 4L12 20L20 4H16.5L12 14L7.5 4H4Z" fill="currentColor"/>
                        <path d="M12 8L11 11H13L12 8Z" fill="white"/>
                    </svg>
                    VIATOR
                </a>
                <a href="javascript:history.back()" class="auth-back">&times;</a>
            </div>
            
            <div class="auth-form-wrap">
                <h1 class="auth-title">Begin your journey</h1>
                <p class="auth-subtitle">Join our community of extraordinary travel chroniclers.</p>

                <div id="form-alert"></div>

                <form id="register-form" class="auth-form" novalidate>
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input class="form-input" id="reg-name" type="text" placeholder="Your name" autocomplete="name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input class="form-input" id="reg-email" type="email" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div style="position: relative;">
                            <input class="form-input" id="reg-password" type="password" placeholder="Min. 8 characters" autocomplete="new-password" required>
                            <button type="button" id="toggle-pw" style="position: absolute; right: 0; bottom: 10px; background: none; border: none; font-size: 1rem; cursor: pointer; color: var(--text-muted);">&bull;&bull;&bull;</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input class="form-input" id="reg-confirm" type="password" placeholder="Repeat password" required>
                    </div>

                    <button type="submit" class="btn-premium" id="reg-btn">
                        <span>Join the Journal</span>
                        <span class="arrow">&rarr;</span>
                    </button>
                </form>

                <p class="auth-link">Already a member? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/effects.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            redirectIfLoggedIn('feed.html');

            document.getElementById('toggle-pw').addEventListener('click', function () {
                const pw = document.getElementById('reg-password');
                const isText = pw.type === 'text';
                pw.type = isText ? 'password' : 'text';
                this.innerHTML = isText ? '&bull;&bull;&bull;' : 'O';
            });

            document.getElementById('register-form').addEventListener('submit', function (e) {
                e.preventDefault();
                const name = document.getElementById('reg-name').value.trim();
                const email = document.getElementById('reg-email').value.trim();
                const password = document.getElementById('reg-password').value;
                const confirm = document.getElementById('reg-confirm').value;

                if (!name || !email || !password || !confirm) {
                    document.getElementById('form-alert').innerHTML = `<p style="color: var(--danger); font-size: 0.8rem; margin-bottom: 1rem;">Please complete all fields.</p>`;
                    return;
                }

                if (password !== confirm) {
                    document.getElementById('form-alert').innerHTML = `<p style="color: var(--danger); font-size: 0.8rem; margin-bottom: 1rem;">Passwords do not match.</p>`;
                    return;
                }

                const btn = document.getElementById('reg-btn');
                btn.disabled = true;
                btn.querySelector('span:first-child').textContent = 'Creating Journal...';

                setTimeout(() => {
                    const result = register({ name, email, password });
                    if (result.success) {
                        window.location.href = 'feed.html';
                    } else {
                        document.getElementById('form-alert').innerHTML = `<p style="color: var(--danger); font-size: 0.8rem; margin-bottom: 1rem;">${result.error}</p>`;
                        btn.disabled = false;
                        btn.querySelector('span:first-child').textContent = 'Join the Journal';
                    }
                }, 600);
            });
        });
    </script>
</body>
</html>
